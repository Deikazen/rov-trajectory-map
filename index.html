<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROV Depth Monitoring Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-gray-900 text-gray-100 font-sans w-full h-full p-0">

    <!--
      HACK TAILWIND CDN:
      Div ini disembunyikan, fungsinya cuma buat mancing compiler Tailwind CDN
      biar nge-generate class warna yang dipanggil lewat Javascript.
    -->
    <div class="hidden bg-emerald-500 border-emerald-400 bg-sky-500 border-sky-400 bg-amber-500 bg-red-600 shadow-[0_0_10px_#10b981] shadow-[0_0_10px_#0ea5e9]"></div>

    <div class="w-full h-full bg-gray-800 border border-gray-700 flex flex-col overflow-hidden shadow-2xl">

        <!-- Top Header Bar -->
        <div class="p-4 bg-gray-850 border-b border-gray-700 flex justify-between items-center" style="background-color: #1a222c;">
            <div class="flex flex-col">
                <span class="text-sm font-bold tracking-wider text-gray-300 uppercase">
                    Depth Graph — Forward Scrolling
                </span>
                <span class="text-xs text-gray-500">
                    ROV depth monitoring from MS5837 pressure sensor (cm, max 200)
                </span>
            </div>

            <div class="flex items-center space-x-3 bg-gray-900 px-3 py-1.5 rounded-md border border-gray-700">
                <span class="text-xs font-semibold text-gray-400">Data Status:</span>
                <div id="status-badge"
                    class="px-2 py-0.5 text-[10px] font-bold rounded bg-red-500 text-white animate-pulse">
                    CONNECTING...
                </div>
            </div>
        </div>

        <!-- Canvas Container -->
        <div id="mapWrapper" class="flex-1 p-3 bg-slate-900/40 relative min-h-0">
            <canvas id="mapCanvas"
                class="w-full h-full bg-[#f8fafc]/5 rounded-lg border border-gray-800 shadow-inner"></canvas>
        </div>

        <!-- Bottom Controls Bar -->
        <div class="p-4 border-t border-gray-700 flex flex-wrap justify-between gap-3" style="background-color: #1a222c;">
            <div class="flex items-center gap-2">
                <span class="text-xs font-semibold text-gray-400">Mode:</span>
                <button id="real-mode-btn" onclick="setDataMode('real')"
                    class="px-3 py-1.5 text-sm font-semibold rounded border transition shadow-sm bg-white text-gray-800 border-gray-300 hover:bg-gray-100">
                    Real Data
                </button>
                <button id="dummy-mode-btn" onclick="setDataMode('dummy')"
                    class="px-3 py-1.5 text-sm font-semibold rounded border transition shadow-sm bg-sky-500 text-white border-sky-400">
                    Dummy Data
                </button>
            </div>

            <div class="flex items-center space-x-3">
                <button onclick="clearPath()"
                    class="px-4 py-1.5 text-sm font-semibold bg-white text-gray-800 rounded border border-gray-300 hover:bg-gray-100 transition shadow-sm">
                    Clear Graph
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_TELEMETRY = `${window.location.origin}/api/telemetry`;
        const API_SOURCE = `${window.location.origin}/api/source`;

        const MAX_DEPTH_CM = 200;
        const MAX_POINTS = 100;

        let depthSeries = [];
        let currentDepthCm = 0;
        let dataMode = 'dummy'; // Default sesuai backend

        // UI Elements
        const statusBadge = document.getElementById('status-badge');
        const realModeBtn = document.getElementById('real-mode-btn');
        const dummyModeBtn = document.getElementById('dummy-mode-btn');

        // Setup Canvas Context
        const canvas = document.getElementById('mapCanvas');
        const mapWrapper = document.getElementById('mapWrapper');
        const ctx = canvas.getContext('2d');

        function resizeCanvasToContainer() {
            const width = Math.max(mapWrapper.clientWidth, 320);
            const height = Math.max(mapWrapper.clientHeight, 220);
            canvas.width = width;
            canvas.height = height;
            drawTrajectoryMap();
        }

        // Update tampilan badge status
        function updateStatusBadge(status) {
            if (status === 'real-online') {
                statusBadge.textContent = "ONLINE (MAVLINK)";
                statusBadge.className = "px-2 py-0.5 text-[10px] font-bold rounded bg-emerald-500 text-white shadow-[0_0_10px_#10b981]";
            } else if (status === 'real-offline') {
                statusBadge.textContent = "NO MAVLINK";
                statusBadge.className = "px-2 py-0.5 text-[10px] font-bold rounded bg-amber-500 text-white animate-pulse";
            } else if (status === 'dummy') {
                statusBadge.textContent = "DUMMY MODE";
                statusBadge.className = "px-2 py-0.5 text-[10px] font-bold rounded bg-sky-500 text-white shadow-[0_0_10px_#0ea5e9]";
            } else if (status === 'server-offline') {
                statusBadge.textContent = "SERVER DISCONNECTED";
                statusBadge.className = "px-2 py-0.5 text-[10px] font-bold rounded bg-red-600 text-white animate-pulse";
            }
        }

        // Update style tombol mode
        function updateButtonStyles(mode) {
            dataMode = mode;
            realModeBtn.className = mode === 'real'
                ? "px-3 py-1.5 text-sm font-semibold rounded border transition shadow-sm bg-emerald-500 text-white border-emerald-400"
                : "px-3 py-1.5 text-sm font-semibold rounded border transition shadow-sm bg-white text-gray-800 border-gray-300 hover:bg-gray-100";

            dummyModeBtn.className = mode === 'dummy'
                ? "px-3 py-1.5 text-sm font-semibold rounded border transition shadow-sm bg-sky-500 text-white border-sky-400"
                : "px-3 py-1.5 text-sm font-semibold rounded border transition shadow-sm bg-white text-gray-800 border-gray-300 hover:bg-gray-100";
        }

        function pushDepthPoint(depthCm) {
            const clampedDepth = Math.max(0, Math.min(MAX_DEPTH_CM, depthCm));
            currentDepthCm = clampedDepth;
            depthSeries.push(clampedDepth);
            if (depthSeries.length > MAX_POINTS) {
                depthSeries.shift();
            }
        }

        async function setDataMode(mode) {
            try {
                const response = await fetch(API_SOURCE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source: mode })
                });
                if (!response.ok) throw new Error("Gagal mengubah mode data");

                const result = await response.json();
                updateButtonStyles(result.source);
            } catch (error) {
                console.error("Gagal mengirim request ganti mode:", error);
            }
        }

        async function fetchTelemetry() {
            try {
                const response = await fetch(API_TELEMETRY);
                if (!response.ok) throw new Error("Server Error");

                const telemetry = await response.json();

                if (telemetry.source !== dataMode) {
                    updateButtonStyles(telemetry.source);
                }

                if (telemetry.source === 'dummy') {
                    updateStatusBadge('dummy');
                } else if (telemetry.mavlink_connected) {
                    updateStatusBadge('real-online');
                } else {
                    updateStatusBadge('real-offline');
                }

                const depthCm = telemetry.depth_cm ?? (telemetry.depth * 100) ?? 0;
                pushDepthPoint(depthCm);
                drawTrajectoryMap();

            } catch (error) {
                updateStatusBadge('server-offline');
            }
        }

        function drawTrajectoryMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const gridSpacingX = Math.floor(canvas.width / 10);
            const gridSpacingY = Math.floor(canvas.height / 8);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += gridSpacingX) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += gridSpacingY) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            ctx.fillStyle = 'rgba(156, 163, 175, 0.9)';
            ctx.font = '11px sans-serif';
            for (let cm = 0; cm <= MAX_DEPTH_CM; cm += 25) {
                const y = canvas.height - ((cm / MAX_DEPTH_CM) * canvas.height);
                ctx.fillText(`${cm} cm`, 8, Math.max(12, y - 4));
            }

            if (depthSeries.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = '#f59e0b';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for (let i = 0; i < depthSeries.length; i++) {
                    const x = (i / (MAX_POINTS - 1)) * canvas.width;
                    const y = canvas.height - ((depthSeries[i] / MAX_DEPTH_CM) * canvas.height);
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();
            }

            if (depthSeries.length > 0) {
                const x = ((depthSeries.length - 1) / (MAX_POINTS - 1)) * canvas.width;
                const y = canvas.height - ((currentDepthCm / MAX_DEPTH_CM) * canvas.height);
                ctx.fillStyle = '#38bdf8';
                ctx.beginPath();
                ctx.arc(x, y, 5.5, 0, 2 * Math.PI);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.fillStyle = 'rgba(226, 232, 240, 0.95)';
                ctx.font = 'bold 12px sans-serif';
                ctx.fillText(`Depth: ${currentDepthCm.toFixed(1)} cm`, Math.max(10, x - 80), Math.max(20, y - 12));
            }

            ctx.fillStyle = 'rgba(148, 163, 184, 0.9)';
            ctx.font = '11px sans-serif';
            ctx.fillText('Time ->', canvas.width - 58, canvas.height - 8);
        }

        function clearPath() {
            depthSeries = [];
            currentDepthCm = 0;
            drawTrajectoryMap();
        }

        resizeCanvasToContainer();
        window.addEventListener('resize', resizeCanvasToContainer);

        // Polling telemetri setiap 100ms
        setInterval(fetchTelemetry, 100);
    </script>
</body>

</html>
